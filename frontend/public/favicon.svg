<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="EmergentCTI favicon">
  <style>
    /* Default: light */
    :root{
      --bg:transparent;
      --fg:#0B0B0B;
      --red:#85191A;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:transparent;
        --fg:#FFFFFF;
        --red:#85191A;
      }
    }
    .bg{fill:var(--bg);}
    .hex{stroke:var(--fg);stroke-width:3;fill:none;stroke-linejoin:round;}
    .x{stroke:var(--red);stroke-width:3.2;fill:none;stroke-linecap:round;}
  </style>

  <rect class="bg" x="0" y="0" width="64" height="64" rx="10"></rect>

  <!-- Flat-top regular hex (center 32,32; R ~ 22) -->
  <path class="hex" d="M54 32 L43 51.05 L21 51.05 L10 32 L21 12.95 L43 12.95 Z"></path>

  <!-- Clean "network" hint -->
  <path class="x" d="M22 22 L42 42"></path>
  <path class="x" d="M42 22 L22 42"></path>
</svg>
