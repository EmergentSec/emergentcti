services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-cti}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cti}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?required}
    command: >-
      redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    dns:
      - "8.8.8.8"
      - "1.1.1.1"
    command: >-
      sh -c "alembic upgrade head &&
      gunicorn cti.main:app -w 1 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --access-logfile - --timeout 120"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-cti}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?required}
      FEED_ENCRYPTION_KEY: ${FEED_ENCRYPTION_KEY:?required}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      URLSCAN_API_KEY: ${URLSCAN_API_KEY:-}
      THREATFOX_API_KEY: ${THREATFOX_API_KEY:-}
      PHISHTANK_API_KEY: ${PHISHTANK_API_KEY:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Required in production. In development, auto-generates if empty (sessions lost on restart).
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173","http://localhost:8080"]}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
